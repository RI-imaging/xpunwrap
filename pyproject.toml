[project]
name = "unwrap-phase-gpu"
version = "0.1.0"
description = "Phase unwrapping algorithms which are CPU and GPU agnostic"
requires-python = ">=3.10"
dependencies = [
    "cupy-cuda12x>=14.0.1",
    "numpy>=2.2.6",
]

[project.optional-dependencies]
# cupy has two installation options, depending on your CUDA Toolkit version
cupy-cuda12x = [
    "cupy-cuda12x",
]
cupy-cuda13x = [
    "cupy-cuda13x",
]
