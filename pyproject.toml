[project]
name = "unwrap-phase-gpu"
version = "0.1.0"
description = "Phase unwrapping algorithms which are CPU and GPU agnostic"
requires-python = ">=3.10"
dependencies = [
    "numpy>=2.2.6",
]

[project.optional-dependencies]
# cupy has several installation options, depending on your CUDA Toolkit version
cupy-cuda12x = [
    "cupy-cuda12x",
]
cupy-cuda13x = [
    "cupy-cuda13x",
]

[dependency-groups]
tests = [
    "pytest>=9.0.2",
]
dev = [
    {include-group="tests"},
     "flake8>=7.3.0",
]
docs = [
    "sphinx>=7.2",
    "sphinx-rtd-theme>=2.0",
    "myst-parser>=2.0",
]
examples = [
    "matplotlib>=3.10.8",
    "qpretrieve>=0.6.0",
]
